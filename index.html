<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Nahvi — agentic resilience mapping. BYO keys, glass-clear UX." />
    <title>Nahvi · Agentic Resilience Mapping</title>
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <span class="brand" aria-hidden="true"></span>
      <h1>Nahvi</h1>
      <p class="tag">agentic resilience map</p>
    </header>

    <main>
      <aside id="controls" aria-label="Controls">
        <section aria-labelledby="keys-heading">
          <h2 id="keys-heading">Keys · local</h2>
          <form id="keys-form">
            <label>ORS<input id="ors-key" type="password" autocomplete="off" placeholder="openrouteservice token" /></label>
            <label>OpenAI<input id="openai-key" type="password" autocomplete="off" placeholder="optional" /></label>
            <label>Anthropic<input id="anthropic-key" type="password" autocomplete="off" placeholder="optional" /></label>
            <button type="submit">Save</button>
          </form>
        </section>

        <section aria-labelledby="route-heading">
          <h2 id="route-heading">Route</h2>
          <form id="route-form">
            <label>Start<input id="route-start" value="41.8781,-87.6298" required placeholder="lat,lng" /></label>
            <label>End<input id="route-end" value="41.8902,-87.6356" required placeholder="lat,lng" /></label>
            <label>Mode
              <select id="route-profile">
                <option value="foot-walking">Walk</option>
                <option value="cycling-regular">Cycle</option>
                <option value="wheelchair">Wheelchair</option>
              </select>
            </label>
            <label class="inline"><input id="avoid-hazards" type="checkbox" /> Avoid hazards</label>
            <button type="submit">Find route</button>
            <button id="optimize-demo" type="button">Optimize stops</button>
          </form>
        </section>

        <section aria-labelledby="iso-heading">
          <h2 id="iso-heading">Reach</h2>
          <form id="iso-form">
            <label>Center<input id="iso-center" value="41.8781,-87.6298" required placeholder="lat,lng" /></label>
            <label>Minutes<input id="iso-minutes" type="number" min="1" max="60" value="15" required /></label>
            <label>Mode
              <select id="iso-profile">
                <option value="foot-walking">Walk</option>
                <option value="cycling-regular">Cycle</option>
                <option value="wheelchair">Wheelchair</option>
              </select>
            </label>
            <button type="submit">Compute</button>
          </form>
          <p id="amenity-summary"></p>
        </section>

        <section aria-labelledby="layers-heading">
          <h2 id="layers-heading">Layers</h2>
          <div class="buttons">
            <button id="toggle-amenities" type="button">Amenities</button>
            <button id="toggle-hazards" type="button">Hazards</button>
            <button id="toggle-crime" type="button">Safety</button>
            <button id="load-air" type="button">Air</button>
          </div>
          <p id="data-source"></p>
        </section>

        <section aria-labelledby="agent-heading">
          <h2 id="agent-heading">Agent</h2>
          <form id="assistant-form">
            <label for="assistant-prompt">Prompt</label>
            <textarea id="assistant-prompt" rows="3" placeholder="e.g. safest wheelchair route avoiding floods"></textarea>
            <button type="submit">Run</button>
          </form>
        </section>

        <p id="status-message" role="status" aria-live="polite"></p>
        <p class="disclaimer">Planning aid only. For active emergencies, follow official local guidance.</p>
        <button id="locate-me" type="button">Use my location</button>
      </aside>

      <section id="map" aria-label="Map"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script type="module" src="./js/ui.js"></script>
  </body>
</html>
